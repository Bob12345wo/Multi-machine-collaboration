# Shared-map formation controller for robot2.
# Requires TF:
#   map -> robot1/base_link
#   map -> robot2/base_link
map_frame: map
leader_frame: robot1/base_link
follower_frame: robot2/base_link
cmd_vel_topic: /robot2/cmd_vel
control_mode: wheeltec_global
use_leader_offsets: true

# Desired follower position in leader body frame.
# wheeltec_global uses this as a fixed map-frame offset after AMCL initialization.
# If both cars start facing map +X, -0.8 means robot2 stays about 0.8 m behind robot1.
# body_trailing uses this in the leader body frame.
offset_x: -0.8
offset_y: 0.0

loop_rate: 20
max_linear_speed: 0.6
max_angular_speed: 0.8
min_linear_speed: 0.05
min_angular_speed: 0.05
pos_deadband: 0.05
yaw_deadband: 0.08

# Gains equivalent to wheeltec_multi k_v/k_l/k_a, adapted for LIMO.
k_v: 0.9
k_l: 0.55
k_a: 0.9
k_heading: 0.9
leader_vx_gain: 1.0
leader_wz_gain: 0.8
target_filter_alpha: 0.35
cmd_filter_alpha: 0.45
heading_lookahead: 0.45
max_target_jump: 0.8
yaw_priority_threshold: 0.38
turn_in_place_wz_threshold: 0.35
max_turn_linear_speed: 0.16
yaw_priority_vx_scale: 0.45
turn_radius_compensation: true
allow_reverse_while_leader_forward: false
